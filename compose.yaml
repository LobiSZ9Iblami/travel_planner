services:
  app:
    build: .
    container_name: travel_planner
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - .:/app
    command: python run.py

    depends_on:
      - app_db

  app_db:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
